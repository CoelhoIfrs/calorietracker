<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>CalorieTracker</title>
  <style>
    :root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#e94560;--green:#00d474;--yellow:#f5a623;--text:#eee;--muted:#888;--radius:16px;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:calc(var(--safe-top) + 8px) 16px calc(var(--safe-bottom) + 80px);overflow-x:hidden}
    h1{font-size:1.6rem;text-align:center;padding:12px 0}h1 span{color:var(--accent)}
    .card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{font-size:.75rem;color:var(--muted);display:block;margin-bottom:4px}
    input,select{width:100%;padding:10px 12px;border:1px solid #333;border-radius:10px;background:#111;color:var(--text);font-size:1rem;outline:none;transition:border .2s}
    input:focus,select:focus{border-color:var(--accent)}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s}
    .btn:active{transform:scale(.97);opacity:.8}
    .btn-primary{background:var(--accent);color:#fff}.btn-green{background:var(--green);color:#fff}
    .btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
    .btn-sm{width:auto;padding:8px 16px;font-size:.85rem;border-radius:8px}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tab{flex:1;padding:10px;border:1.5px solid #333;border-radius:10px;background:transparent;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
    .tab.active{border-color:var(--accent);color:var(--accent);background:#e9456015}
    .ring-wrap{text-align:center;padding:10px 0}
    .ring-wrap svg{width:180px;height:180px;transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:#222;stroke-width:10}.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .3s}
    .ring-text{font-size:1.8rem;font-weight:700}.ring-sub{font-size:.85rem;color:var(--muted)}
    .meal-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #222}
    .meal-item:last-child{border:none}
    .meal-thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;background:#222;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .meal-info{flex:1;min-width:0}.meal-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meal-meta{font-size:.8rem;color:var(--muted)}.meal-kcal{font-weight:700;color:var(--accent);white-space:nowrap}
    .meal-del{background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;padding:4px 8px}
    .search-wrap{position:relative;margin-bottom:10px}.search-wrap input{padding-left:36px}
    .search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.9rem}
    .results{max-height:200px;overflow-y:auto}
    .result-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;cursor:pointer;transition:background .15s}
    .result-item:active{background:#ffffff10}
    .ingredient-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #222;font-size:.9rem}
    .ingredient-row:last-child{border:none}
    .ing-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ing-detail{color:var(--muted);font-size:.8rem}.ing-kcal{font-weight:700;color:var(--accent);white-space:nowrap;min-width:55px;text-align:right}
    .ing-del{background:none;border:none;color:#555;font-size:1rem;cursor:pointer}
    .recipe-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-top:8px;border-top:2px solid var(--accent);font-weight:700;font-size:1.1rem}
    .recipe-total span{color:var(--accent)}
    .add-ing-form{display:flex;gap:6px;margin-bottom:10px}
    .add-ing-form input{font-size:.85rem;padding:8px 10px}.add-ing-form input:first-child{flex:2}.add-ing-form input:nth-child(2){flex:1}
    .photo-area{border:2px dashed #333;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;margin-top:10px}
    .photo-area:active{border-color:var(--accent)}
    .photo-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .photo-preview{width:100%;border-radius:10px;margin-top:10px;display:none}
    .chart-canvas{width:100%;height:200px}
    .weight-row{display:flex;gap:8px;margin-top:10px}.weight-row input{flex:1}.weight-row .btn{width:auto;padding:10px 16px}
    nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:8px 0 calc(var(--safe-bottom) + 8px);border-top:1px solid #222;z-index:100}
    .nav-btn{background:none;border:none;color:var(--muted);font-size:.65rem;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 12px;transition:color .2s}
    .nav-btn.active{color:var(--accent)}.nav-btn span{font-size:1.4rem}
    .page{display:none}.page.active{display:block}
    .mt{margin-top:10px}.mb{margin-bottom:10px}.center{text-align:center}
    .tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
    .tag-ok{background:#00d47422;color:var(--green)}.tag-warn{background:#f5a62322;color:var(--yellow)}.tag-over{background:#e9456022;color:var(--accent)}
    .empty{text-align:center;color:var(--muted);padding:30px 0;font-size:.9rem}
    .loader{display:inline-block;width:18px;height:18px;border:2px solid #fff3;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none!important}

    .macro-item{text-align:center}.macro-val{font-weight:700;font-size:1rem}.macro-label{font-size:.65rem;color:var(--muted)}
    .translate-hint{font-size:.7rem;color:var(--muted);font-style:italic;margin-top:2px}
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="page active">
  <h1>🔥 <span>Calorie</span>Tracker</h1>
  <div class="card">
    <p class="center mb" style="font-size:.9rem;color:var(--muted)">Configure o seu perfil para calcular a meta calórica ideal</p>
    <div class="grid">
      <div><label>Sexo</label><select id="sex"><option value="M">Masculino</option><option value="F">Feminino</option></select></div>
      <div><label>Idade</label><input id="age" type="number" placeholder="25" inputmode="numeric"></div>
      <div><label>Altura (cm)</label><input id="height" type="number" placeholder="175" inputmode="numeric"></div>
      <div><label>Peso Atual (kg)</label><input id="weight" type="number" placeholder="80" inputmode="decimal"></div>
      <div><label>Peso Objetivo (kg)</label><input id="goal" type="number" placeholder="70" inputmode="decimal"></div>
      <div><label>Atividade</label><select id="activity"><option value="1.2">Sedentário</option><option value="1.375">Leve</option><option value="1.55" selected>Moderado</option><option value="1.725">Intenso</option><option value="1.9">Atleta</option></select></div>
    </div>
    <button class="btn btn-primary mt" onclick="saveProfile()">Começar 🚀</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h1>🔥 <span>Calorie</span>Tracker</h1>
  <div class="card ring-wrap">
    <svg viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/><circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73"/></svg>
    <div class="ring-text" id="kcalNow">0</div>
    <div class="ring-sub">de <b id="kcalGoal">0</b> kcal</div>
    <div class="mt" id="statusTag"></div>
    <div class="macro-bar">
      <div class="macro-item"><div class="macro-val" id="macroP">0g</div><div class="macro-label">Proteína</div></div>
      <div class="macro-item"><div class="macro-val" id="macroC">0g</div><div class="macro-label">Carbos</div></div>
      <div class="macro-item"><div class="macro-val" id="macroG">0g</div><div class="macro-label">Gordura</div></div>
    </div>
  </div>

  <div class="card">
    <label>Adicionar Refeição</label>
    <div class="tabs">
      <button class="tab active" data-tab="search" onclick="switchTab('search')">🔍 Busca Rápida</button>
      <button class="tab" data-tab="recipe" onclick="switchTab('recipe')">🧑‍🍳 Montar Receita</button>
    </div>

    <div id="tabSearch">
      <div class="search-wrap"><input id="foodSearch" type="text" placeholder="Ex: frango desfiado, arroz, pizza..." enterkeyhint="search"></div>
      <div id="searchResults" class="results"></div>
    </div>

    <div id="tabRecipe" class="hidden">
      <input id="recipeName" type="text" placeholder="Nome da refeição (ex: Almoço)" class="mb" style="font-size:.9rem">
      <div class="add-ing-form">
        <input id="ingName" type="text" placeholder="Ingrediente (ex: frango)">
        <input id="ingWeight" type="number" placeholder="g" inputmode="numeric">
        <button class="btn btn-primary btn-sm" onclick="searchIngredient()">+</button>
      </div>
      <div id="ingResults" class="results"></div>
      <div id="ingredientList"></div>
      <div id="recipeTotal" class="hidden">
        <div class="recipe-total"><div>Total</div><span id="recipeTotalKcal">0 kcal</span></div>
        <button class="btn btn-green mt" onclick="saveRecipe()">✅ Salvar Refeição</button>
      </div>
    </div>

    <div class="photo-area" id="photoArea">
      📷 Toque para tirar foto da refeição
      <input type="file" accept="image/*" capture="environment" id="photoInput">
      <img class="photo-preview" id="photoPreview">
    </div>
  </div>

  <div class="card">
    <label>Refeições de Hoje</label>
    <div id="mealList"><div class="empty">Nenhuma refeição registada 🍽️</div></div>
  </div>
</div>

<!-- PROGRESS -->
<div id="progress" class="page">
  <h1>📈 <span>Evolução</span></h1>
  <div class="card"><label>Registar Peso Atual</label><div class="weight-row"><input id="newWeight" type="number" placeholder="kg" inputmode="decimal"><button class="btn btn-primary" onclick="logWeight()">+</button></div></div>
  <div class="card"><label>Calorias — Últimos 7 dias</label><canvas id="chartCal" class="chart-canvas"></canvas></div>
  <div class="card"><label>Peso — Evolução</label><canvas id="chartWeight" class="chart-canvas"></canvas></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <h1>👤 <span>Perfil</span></h1>
  <div class="card" id="profileInfo"></div>
  <button class="btn btn-outline mt" onclick="resetApp()">Redefinir Tudo 🗑️</button>
</div>

<nav>
  <button class="nav-btn active" data-page="home"><span>🏠</span>Início</button>
  <button class="nav-btn" data-page="progress"><span>📈</span>Evolução</button>
  <button class="nav-btn" data-page="profile"><span>👤</span>Perfil</button>
</nav>

// ── Tradução inteligente ───────────────────────────────────
function translate(text) {
  const lower = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const lowerOrig = text.toLowerCase();

  // Tenta match exato primeiro
  if (DICT[lowerOrig]) return { en: DICT[lowerOrig], pt: text };
  if (DICT[lower]) return { en: DICT[lower], pt: text };

  // Tenta match parcial (maior match primeiro)
  const keys = Object.keys(DICT).sort((a, b) => b.length - a.length);
  let translated = lowerOrig;
  let found = false;
  for (const key of keys) {
    if (translated.includes(key)) {
      translated = translated.replace(key, DICT[key]);
      found = true;
    }
  }
  if (found) return { en: translated, pt: text };

  // Sem tradução — envia como está
  return { en: text, pt: text };
}

// ── State ──────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0, 10);
const getProfile = () => LS.get('ct_profile');
const getMeals = () => LS.get('ct_meals') || {};
const getWeights = () => LS.get('ct_weights') || [];
const todayMeals = () => (getMeals()[today()] || []);
const todayKcal = () => todayMeals().reduce((s, m) => s + m.kcal, 0);
const todayMacros = () => todayMeals().reduce((o, m) => ({ p: o.p + (m.protein || 0), c: o.c + (m.carbs || 0), g: o.g + (m.fat || 0) }), { p: 0, c: 0, g: 0 });

let currentPhoto = null, recipeIngredients = [];

// ── Profile ────────────────────────────────────────────────
function calcGoal(p) {
  const bmr = p.sex === 'M' ? 10 * p.weight + 6.25 * p.height - 5 * p.age + 5 : 10 * p.weight + 6.25 * p.height - 5 * p.age - 161;
  let tdee = bmr * p.activity;
  if (p.goal < p.weight) tdee -= 500; else if (p.goal > p.weight) tdee += 350;
  return Math.round(tdee);
}

function saveProfile() {
  const p = { sex: $('#sex').value, age: +$('#age').value, height: +$('#height').value, weight: +$('#weight').value, goal: +$('#goal').value, activity: +$('#activity').value };
  if ([p.age, p.height, p.weight, p.goal].some(v => !v || v <= 0)) return alert('Preencha todos os campos.');
  p.kcalGoal = calcGoal(p);
  LS.set('ct_profile', p);
  const w = getWeights();
  if (!w.length) { w.push({ date: today(), kg: p.weight }); LS.set('ct_weights', w); }
  navigate('home');
}

// ── Navigation ─────────────────────────────────────────────
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $(`#${page}`).classList.add('active');
  document.querySelector(`.nav-btn[data-page="${page}"]`)?.classList.add('active');
  if (page === 'home') renderHome();
  if (page === 'progress') renderCharts();
  if (page === 'profile') renderProfile();
}
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => navigate(b.dataset.page)));

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  $('#tabSearch').classList.toggle('hidden', tab !== 'search');
  $('#tabRecipe').classList.toggle('hidden', tab !== 'recipe');
}

// ── Render Home ────────────────────────────────────────────
function renderHome() {
  const p = getProfile(); if (!p) return navigate('setup');
  const eaten = todayKcal(), goal = p.kcalGoal, pct = Math.min(eaten / goal, 1.5);
  const offset = CIRCUM - (Math.min(pct, 1) * CIRCUM);
  const ring = $('#ringFg');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = pct <= .75 ? 'var(--green)' : pct <= 1 ? 'var(--yellow)' : 'var(--accent)';
  $('#kcalNow').textContent = eaten;
  $('#kcalGoal').textContent = goal;
  const remain = goal - eaten;
  const tag = $('#statusTag');
  if (remain > goal * .25) tag.innerHTML = `<span class="tag tag-ok">👍 Restam ${remain} kcal</span>`;
  else if (remain > 0) tag.innerHTML = `<span class="tag tag-warn">⚠️ Quase no limite — ${remain} kcal</span>`;
  else tag.innerHTML = `<span class="tag tag-over">🚫 Excedeu ${Math.abs(remain)} kcal</span>`;
  const m = todayMacros();
  $('#macroP').textContent = m.p + 'g'; $('#macroC').textContent = m.c + 'g'; $('#macroG').textContent = m.g + 'g';
  renderMealList();
}

function renderMealList() {
  const meals = todayMeals(), el = $('#mealList');
  if (!meals.length) { el.innerHTML = '<div class="empty">Nenhuma refeição registada 🍽️</div>'; return; }
  el.innerHTML = meals.map((m, i) => `
    <div class="meal-item">
      ${m.photo ? `<img class="meal-thumb" src="${m.photo}" alt="">` : `<div class="meal-thumb">${m.isRecipe ? '🧑‍🍳' : '🍽️'}</div>`}
      <div class="meal-info">
        <div class="meal-name">${m.name}</div>
        <div class="meal-meta">${m.isRecipe ? m.ingredients + ' itens · ' : ''}${m.protein}g P · ${m.carbs}g C · ${m.fat}g G</div>
      </div>
      <div class="meal-kcal">${m.kcal}</div>
      <button class="meal-del" onclick="delMeal(${i})">✕</button>
    </div>`).join('');
}

function delMeal(i) { const all = getMeals(); all[today()].splice(i, 1); LS.set('ct_meals', all); renderHome(); }

// ── API Search (com tradução) ──────────────────────────────
async function apiSearch(query, originalPt) {
  const res = await fetch(API_URL + encodeURIComponent(query), { headers: { 'X-Api-Key': API_KEY } });
  const data = await res.json();
  const items = data.items || [];
  // Se buscou em inglês, adiciona o nome PT original
  if (originalPt) items.forEach(it => it.namePt = originalPt);
  return items;
}

async function smartSearch(text) {
  const { en, pt } = translate(text);
  // Tenta em inglês traduzido
  let items = await apiSearch(en, pt);
  // Se não encontrou e o texto original é diferente, tenta o original
  if (!items.length && en !== text) items = await apiSearch(text);
  return items;
}

async function smartSearchWithWeight(text, weight) {
  const { en, pt } = translate(text);
  const query = weight ? `${weight}g ${en}` : en;
  let items = await apiSearch(query, pt);
  if (!items.length) {
    const fallback = weight ? `${weight}g ${text}` : text;
    items = await apiSearch(fallback);
  }
  return items;
}

// ── Tab 1: Quick Search ────────────────────────────────────
let searchTimer;
$('#foodSearch').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { $('#searchResults').innerHTML = ''; return; }
  searchTimer = setTimeout(() => quickSearch(q), 500);
});

async function quickSearch(query) {
  const el = $('#searchResults');
  el.innerHTML = '<div class="center"><div class="loader"></div></div>';
  try {
    const items = await smartSearch(query);
    if (!items.length) { el.innerHTML = '<div class="empty">Nenhum resultado encontrado 😕</div>'; return; }
    el.innerHTML = items.map(it => {
      const displayName = it.namePt || it.name;
      const safe = JSON.stringify(it).replace(/'/g, "&#39;").replace(/"/g, '&quot;');
      return `<div class="result-item" onclick='addQuickFood(JSON.parse(this.dataset.item))' data-item='${JSON.stringify(it)}'>
        <div>
          <div style="font-weight:600">${capitalize(displayName)}</div>
          <div style="font-size:.7rem;color:#666;font-style:italic">${it.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">${it.serving_size_g}g · P:${it.protein_g}g C:${it.carbohydrates_total_g}g G:${it.fat_total_g}g</div>
        </div>
        <div style="font-weight:700;color:var(--accent)">${Math.round(it.calories)} kcal</div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = '<div class="empty">Erro na busca. Verifique a API Key.</div>'; }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function addQuickFood(item) {
  const name = item.namePt || item.name;
  saveMeal({
    name: capitalize(name), kcal: Math.round(item.calories),
    protein: Math.round(item.protein_g), carbs: Math.round(item.carbohydrates_total_g),
    fat: Math.round(item.fat_total_g), isRecipe: false
  });
  $('#foodSearch').value = ''; $('#searchResults').innerHTML = '';
}

// ── Tab 2: Recipe Builder ──────────────────────────────────
$('#ingName').addEventListener('keydown', e => { if (e.key === 'Enter') searchIngredient(); });

async function searchIngredient() {
  const name = $('#ingName').value.trim(), weight = +$('#ingWeight').value;
  if (!name) return alert('Digite o nome do ingrediente.');
  const el = $('#ingResults');
  el.innerHTML = '<div class="center"><div class="loader"></div></div>';
  try {
    const items = await smartSearchWithWeight(name, weight);
    if (!items.length) { el.innerHTML = '<div class="empty">Ingrediente não encontrado 😕<br><span style="font-size:.75rem">Tente outro nome (ex: "frango" em vez de "frango desfiado")</span></div>'; return; }
    el.innerHTML = items.map(it => {
      const displayName = it.namePt || it.name;
      return `<div class="result-item" onclick='addIngredient(JSON.parse(this.dataset.item))' data-item='${JSON.stringify(it)}'>
        <div>
          <div style="font-weight:600">${capitalize(displayName)}</div>
          <div style="font-size:.7rem;color:#666;font-style:italic">${it.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">${it.serving_size_g}g · P:${it.protein_g}g C:${it.carbohydrates_total_g}g G:${it.fat_total_g}g</div>
        </div>
        <div style="font-weight:700;color:var(--accent)">${Math.round(it.calories)} kcal</div>
      </div>`;
    }).join('');
  } catch { el.innerHTML = '<div class="empty">Erro na busca.</div>'; }
}

function addIngredient(item) {
  const name = item.namePt || item.name;
  recipeIngredients.push({
    name: capitalize(name), grams: item.serving_size_g,
    kcal: Math.round(item.calories), protein: Math.round(item.protein_g),
    carbs: Math.round(item.carbohydrates_total_g), fat: Math.round(item.fat_total_g)
  });
  $('#ingName').value = ''; $('#ingWeight').value = ''; $('#ingResults').innerHTML = '';
  renderIngredients();
}

function removeIngredient(i) { recipeIngredients.splice(i, 1); renderIngredients(); }

function renderIngredients() {
  const el = $('#ingredientList'), total = $('#recipeTotal');
  if (!recipeIngredients.length) { el.innerHTML = ''; total.classList.add('hidden'); return; }
  total.classList.remove('hidden');
  const sum = recipeIngredients.reduce((o, ing) => ({ kcal: o.kcal + ing.kcal, p: o.p + ing.protein, c: o.c + ing.carbs, g: o.g + ing.fat }), { kcal: 0, p: 0, c: 0, g: 0 });
  el.innerHTML = recipeIngredients.map((ing, i) => `
    <div class="ingredient-row">
      <div class="ing-name">${ing.name}</div>
      <div class="ing-detail">${ing.grams}g</div>
      <div class="ing-kcal">${ing.kcal} kcal</div>
      <button class="ing-del" onclick="removeIngredient(${i})">✕</button>
    </div>`).join('');
  $('#recipeTotalKcal').textContent = `${sum.kcal} kcal (P:${sum.p}g C:${sum.c}g G:${sum.g}g)`;
}

function saveRecipe() {
  if (!recipeIngredients.length) return alert('Adicione pelo menos 1 ingrediente.');
  const sum = recipeIngredients.reduce((o, ing) => ({ kcal: o.kcal + ing.kcal, p: o.p + ing.protein, c: o.c + ing.carbs, g: o.g + ing.fat }), { kcal: 0, p: 0, c: 0, g: 0 });
  const name = $('#recipeName').value.trim() || recipeIngredients.map(i => i.name).join(' + ');
  saveMeal({ name, kcal: sum.kcal, protein: sum.p, carbs: sum.c, fat: sum.g, isRecipe: true, ingredients: recipeIngredients.length });
  recipeIngredients = []; $('#recipeName').value = ''; renderIngredients();
}

// ── Save Meal ──────────────────────────────────────────────
function saveMeal(meal) {
  const all = getMeals(), d = today();
  if (!all[d]) all[d] = [];
  meal.photo = currentPhoto;
  meal.time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  all[d].push(meal);
  LS.set('ct_meals', all);
  currentPhoto = null; $('#photoPreview').style.display = 'none';
  renderHome();
}

// ── Photo ──────────────────────────────────────────────────
$('#photoInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas'), max = 400, ratio = Math.min(max / img.width, max / img.height, 1);
      c.width = img.width * ratio; c.height = img.height * ratio;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      currentPhoto = c.toDataURL('image/jpeg', 0.6);
      $('#photoPreview').src = currentPhoto; $('#photoPreview').style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── Weight ─────────────────────────────────────────────────
function logWeight() {
  const kg = +$('#newWeight').value; if (!kg || kg <= 0) return;
  const w = getWeights(), idx = w.findIndex(e => e.date === today());
  if (idx >= 0) w[idx].kg = kg; else w.push({ date: today(), kg });
  LS.set('ct_weights', w);
  const p = getProfile(); p.weight = kg; p.kcalGoal = calcGoal(p); LS.set('ct_profile', p);
  $('#newWeight').value = ''; renderCharts();
}

// ── Charts ─────────────────────────────────────────────────
function renderCharts() { drawBarChart('chartCal', getLast7Cal()); drawLineChart('chartWeight', getWeights().slice(-14)); }

function getLast7Cal() {
  const meals = getMeals(), out = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    out.push({ label: d.toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3), value: (meals[key] || []).reduce((s, m) => s + m.kcal, 0) });
  }
  return out;
}

function drawBarChart(id, data) {
  const canvas = $(`#${id}`), ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr; canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = canvas.offsetHeight, pad = 30;
  const max = Math.max(...data.map(d => d.value), 1), goal = getProfile()?.kcalGoal || 2000;
  const barW = (W - pad * 2) / data.length * 0.6, gap = (W - pad * 2) / data.length;
  ctx.clearRect(0, 0, W, H);
  const goalY = H - pad - ((goal / (max * 1.2)) * (H - pad * 2));
  ctx.strokeStyle = '#e9456066'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(pad, goalY); ctx.lineTo(W - pad, goalY); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#e94560'; ctx.font = '10px sans-serif'; ctx.fillText(`Meta: ${goal}`, W - pad - 60, goalY - 4);
  data.forEach((d, i) => {
    const x = pad + i * gap + (gap - barW) / 2, h = (d.value / (max * 1.2)) * (H - pad * 2), y = H - pad - h;
    ctx.fillStyle = d.value <= goal * .75 ? '#00d474' : d.value <= goal ? '#f5a623' : '#e94560';
    ctx.beginPath(); ctx.roundRect(x, y, barW, h, [6, 6, 0, 0]); ctx.fill();
    ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d.label, x + barW / 2, H - 10);
    if (d.value) { ctx.fillStyle = '#eee'; ctx.fillText(d.value, x + barW / 2, y - 6); }
  });
}

function drawLineChart(id, data) {
  if (data.length < 2) return;
  const canvas = $(`#${id}`), ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr; canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = canvas.offsetHeight, pad = 35;
  const vals = data.map(d => d.kg), min = Math.min(...vals) - 2, max = Math.max(...vals) + 2, goal = getProfile()?.goal;
  ctx.clearRect(0, 0, W, H);
  if (goal) {
    const gy = H - pad - ((goal - min) / (max - min)) * (H - pad * 2);
    ctx.strokeStyle = '#00d47466'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(W - pad, gy); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#00d474'; ctx.font = '10px sans-serif'; ctx.fillText(`Obj: ${goal}kg`, W - pad - 55, gy - 4);
  }
  const points = data.map((d, i) => ({ x: pad + (i / (data.length - 1)) * (W - pad * 2), y: H - pad - ((d.kg - min) / (max - min)) * (H - pad * 2) }));
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#e9456033'); grad.addColorStop(1, '#e9456000');
  ctx.beginPath(); ctx.moveTo(points[0].x, H - pad);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points.at(-1).x, H - pad); ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.strokeStyle = '#e94560'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();
  points.forEach((p, i) => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fillStyle = '#e94560'; ctx.fill();
    ctx.fillStyle = '#eee'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${data[i].kg}`, p.x, p.y - 10);
    ctx.fillStyle = '#888'; ctx.font = '9px sans-serif'; ctx.fillText(data[i].date.slice(5), p.x, H - 10);
  });
}

function renderProfile() {
  const p = getProfile(); if (!p) return;
  const diff = p.weight - p.goal;
  const dir = diff > 0 ? `Faltam <b>${diff.toFixed(1)} kg</b> para o objetivo 💪` : diff < 0 ? `Faltam <b>${Math.abs(diff).toFixed(1)} kg</b> para ganhar 💪` : '<b>Objetivo atingido! 🎉</b>';
  $('#profileInfo').innerHTML = `
    <p>👤 <b>${p.sex === 'M' ? 'Masculino' : 'Feminino'}</b>, ${p.age} anos, ${p.height} cm</p>
    <p>⚖️ Peso: <b>${p.weight} kg</b> → Objetivo: <b>${p.goal} kg</b></p>
    <p>🎯 Meta diária: <b>${p.kcalGoal} kcal</b></p>
    <p class="mt">${dir}</p>`;
}

function resetApp() {
  if (!confirm('Tem certeza? Todos os dados serão apagados.')) return;
  ['ct_profile', 'ct_meals', 'ct_weights'].forEach(k => localStorage.removeItem(k));
  navigate('setup');
}

getProfile() ? navigate('home') : navigate('setup');
</script>
